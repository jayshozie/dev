# ==========================
# 1. CORE SYSTEM SETTINGS
# ==========================

# Set the prefix to Ctrl+g (Dvorak friendly, easy to reach)
unbind C-b
set-option -g prefix C-g
bind-key C-g send-prefix

# Zero-out escape time delay for quicker response (Critical for Neovim users)
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Refresh status line every second (Good for the clock)
set -g status-interval 1

# Start window and pane numbering at 1 (Matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# set clipboard on
set -s set-clipboard on

# just why would you completely detach on destroy anyway?
set-option -g detach-on-destroy off

# ==========================
# 2. KEYBINDINGS
# ==========================

# Reload Config (Points to the correct XDG path)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config Reloaded."

# Toggle Mouse (M to toggle)
bind-key M set-option -g mouse \; display-message "Mouse#{?mouse, on, off}."

# Vim-style Copy Mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Pane Navigation (Alt + hjkl)
# No prefix for rapid switching
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# window navigation (Ctrl + 12345)
# IMPORTANT: this requires CSI u standard, so if you're using (e.g. alacritty)
# you have to add some stuff to your config. check my alacritty.toml out to
# see how you're gonna do that
set -s extended-keys on
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5

# tmux-sessionizer thanks to ThePrimeagen
bind-key -r f run-shell "tmux neww tmux-sessionizer"
# bind-key -r M-h run-shell "tmux neww tmux-sessionizer -s 0"
# bind-key -r M-t run-shell "tmux neww tmux-sessionizer -s 1"
# bind-key -r M-n run-shell "tmux neww tmux-sessionizer -s 2"
# bind-key -r M-s run-shell "tmux neww tmux-sessionizer -s 3"

# ==========================
# 3. VISUALS & THEME
# ==========================

# Position status bar at the top (Neovim uses the bottom, avoids visual clash)
set-option -g status-position top

# Silence annoying bells
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# ==========================
# 4. PLUGINS
# ==========================

# Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# Sensible Defaults
set -g @plugin 'tmux-plugins/tmux-sensible'


# Theme: Tokyo Night
# Upstream -> 'janoamaral/tokyo-night-tmux'
# My Fork  -> 'jayshozie/tokyo-night-tmux'
# i like the pill design more
# if you like a boxed design, definitely check the upstream out. it's beautiful
# set -g @plugin 'janoamaral/tokyo-night-tmux'
run-shell ${HOME}/personal/tokyo-night-tmux/tokyo-night.tmux

# Theme Configuration
set -g @tokyo-night-tmux_theme night    # storm | day | default to 'night'
set -g @tokyo-night-tmux_transparent 1  # 1 or 0

set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style none
set -g @tokyo-night-tmux_zoom_id_style none

set -g @tokyo-night-tmux_terminal_icon 
set -g @tokyo-night-tmux_active_terminal_icon 

# No extra spaces between icons
set -g @tokyo-night-tmux_window_tidy_icons 0

# branch name and git status
set -g @tokyo-night-tmux_show_git 1
# show web based git (requires github cli)
set -g @tokyo-night-tmux_show_wbg 0

# Show Date and Time
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format DMY
set -g @tokyo-night-tmux_time_format 24H

# spotify boi
set -g @tokyo-night-tmux_show_music 0

# network
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_netspeed_iface "wlan0"
set -g @tokyo-night-tmux_netspeed_showip 0
set -g @tokyo-night-tmux_netspeed_refresh 0

set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_path_format relative # 'relative' or 'full'

set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_battery_name "BAT0"  # some linux distro have 'BAT0'
set -g @tokyo-night-tmux_battery_low_threshold 21 # default

# ==========================
# 5. PERSISTENCE (Resurrect & Continuum)
# ==========================

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-dir "$HOME/.config/tmux/resurrect"
set -g @resurrect-hook-post-save-all "$HOME/.config/tmux/hooks/clean-resurrect.sh"
set -g @resurrect-strategy-nvim 'session' # doesn't work yet
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

# ==========================
# 6. BOOTSTRAP
# ==========================

# init tmux plugin manager (tpm)
run '~/.config/tmux/plugins/tpm/tpm'

# this set must happen after the load of tmux-sensible
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

