# ARCHITECTURAL VARIABLES
$font = JetBrainsMono Nerd Font ExtraBold
$font_color = rgb(120, 127, 153)
$subtext_color = rgba(120, 127, 153, 0.6)

$outer_gradient = rgba(7aa2f7ee) rgba(bb9af7ff) 90deg
$check_gradient = rgba(e0af68ff) rgba(bb9af7ff) 90deg
$fail_gradient = rgba(f7768eff) rgba(bb9af7ff) 90deg

general {
    hide_cursor = false
    no_fade_in = false
    grace = 0
}

# ANIMATIONS (The Speed Fix)
animations {
    enabled = true
    
    # A valid "Ease Out" curve. 
    # Starts fast (0.16) and hits the target (1) quickly.
    bezier = snappy, 0.16, 1, 0.3, 1
    
    # A standard linear curve for dots
    bezier = linear, 0, 0, 1, 1

    # 1. Colors: 0.2s duration using the snappy curve
    animation = inputFieldColors, 1, 0.2, snappy
    
    # 2. Dots: 0.2s linear
    animation = inputFieldDots, 1, 0.2, linear
    
    # 3. Fade: 0.5s default
    animation = fade, 1, 0.5, default
}

background {
    monitor =
    path = /home/jaysh/pics/wallpapers/safak-tux-wallpaper.png
    
    # The "Creamy" Blur
    blur_passes = 2
    blur_size = 2
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.5
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME (Hero Element)
label {
    monitor =
    text = $TIME
    color = $font_color
    font_size = 120
    font_family = $font
    
    position = 0, 160
    halign = center
    valign = center
    
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgb(0,0,0)
    shadow_boost = 1.2
}

# DATE (Sub-hero)
label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B %Y"
    color = $font_color
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    
    position = 0, 60
    halign = center
    valign = center
}

# INPUT FIELD (The Pill with Gradients)
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    dots_rounded = true
    
    outer_color = $outer_gradient
    check_color = $check_gradient
    fail_color = $fail_gradient
    
    inner_color = rgba(0, 0, 0, 0.5) 
    
    font_color = $font_color
    
    fade_on_empty = true
    fade_timeout = 1000
    
    placeholder_text = <span foreground="##787f99">Password...</span>
    hide_input = false
    rounding = -1
    
    fail_text = <b>Wrong Password. Remaining Attempts: $ATTEMPTS</b>
    
    position = 0, -50
    halign = center
    valign = center
}

# KEYBOARD LAYOUT (Interactive)
label {
    monitor =
    # Icon + Current Layout Name
    text =   $LAYOUT
    color = $subtext_color
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    
    # The Click Handler
    onclick = hyprctl switchxkblayout all next
    
    position = 0, -120
    halign = center
    valign = center
}

