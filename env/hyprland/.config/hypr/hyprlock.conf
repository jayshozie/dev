# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = JetBrainsMono Nerd Font
$font_color = rgb(120, 127, 153)

general {
    hide_cursor = false
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = false
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = eDP-1
    path = /home/jaysh/Pictures/wallpapers/tux-wallpaper.jpg
    blur_passes = 2
}

input-field {
    monitor = eDP-1
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(7aa2f7ee) rgba(bb9af7ff) 90deg
    # check_color = rgba(e0af68ff) rgba(ffc777ff) 45deg
    check_color = rgba(e0af68ff) rgba(bb9af7ff) 90deg
    # fail_color = rgba(f7768eff) rgba(db4b4bff) 45deg
    fail_color = rgba(f7768eff) rgba(bb9af7ff) 90deg

    font_color = $font_color
    fade_on_empty = false
    rounding = 0

    font_family = $font
    placeholder_text = Password...
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    dots_text_format = *
    dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, 0
    halign = center
    valign = center
}

# TIME
label {
    monitor = eDP-1
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font
    color = $font_color

    position = 0, 550
    halign = center
    valign = center
}

# DATE
label {
    monitor = eDP-1
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font
    color = $font_color

    position = 0, 450
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = $LAYOUT[Dvorak,Turkish Q]
    font_size = 24
    font_family = $font
    color = $font_color
    onclick = hyprctl switchxkblayout all next

    position = 0, -100
    halign = center
    valign = center
}
